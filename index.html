<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>lab7-web</title>
  </head>
  <style >
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }
   .board {
      display: grid;
      grid-template-columns: repeat(15, 32px);
      grid-template-rows: repeat(15, 32px);
      border: 2px solid red;
    }

  </style>
  <body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel">
      const root = document.getElementById('root')
      const reactRoot = ReactDOM.createRoot(root)
      const Segment = ({ x, y }) => {
        const style = {
          width: '30px',
          height: '30px',
          background: 'green',
          boxSizing: 'border-box',
          border: '1px solid darkgreen',
          gridColumn: x,
          gridRow: y,
        }

        return <div style={style} />
      }

      const Snake = ({ snake }) => {
        return (
          <>
            {snake.map((part, index) => (
              <Segment key={index} x={part.x} y={part.y} />
            ))}
          </>
        )
      }

      const Board = ({ snake }) => {
        return (
          <main className="board">
            <Snake snake={snake} />
          </main>
        )
      }

      const Game = () => {
        const [direction, setDirection] = React.useState('ArrowRight')
        const [length, setLength] = React.useState(3)
        const [snake, setSnake] = React.useState([
          { x: 5, y: 8 },
          { x: 6, y: 8 },
          { x: 7, y: 8 },
        ])

        React.useEffect(() => {
          const onClick = () => {
            setLength((o) => o + 1)
          }

          window.addEventListener('click', onClick)
          return () => window.removeEventListener('click', onClick)
        }, [])

        React.useEffect(() => {
          const handleKeyDown = (e) => {
            if (
              e.key === 'ArrowUp' ||
              e.key === 'ArrowDown' ||
              e.key === 'ArrowLeft' ||
              e.key === 'ArrowRight'
            ) {
              setDirection(e.key)
            }
          }

          window.addEventListener('keydown', handleKeyDown)
          return () => window.removeEventListener('keydown', handleKeyDown)
        }, [])

        React.useEffect(() => {
          const interval = setInterval(() => {
            setSnake((prev) => {
              const head = prev[0]
              let newHead = { x: head.x, y: head.y }

              switch (direction) {
                case 'ArrowRight':
                  newHead = { x: head.x + 1, y: head.y }
                  break
                case 'ArrowLeft':
                  newHead = { x: head.x - 1, y: head.y }
                  break
                case 'ArrowUp':
                  newHead = { x: head.x, y: head.y - 1 }
                  break
                case 'ArrowDown':
                  newHead = { x: head.x, y: head.y + 1 }
                  break
              }

              newHead.x = ((newHead.x - 1 + 15) % 15) + 1
              newHead.y = ((newHead.y - 1 + 15) % 15) + 1

              return [newHead, ...prev.slice(0, length - 1)]
            })
          }, 1000)

          return () => clearInterval(interval)
        }, [direction, length])

        return <Board snake={snake} />
      }

      const App = () => {
        return <Game />
      }

      reactRoot.render(
          <App />
      )

    </script>
  </body>
</html>
