<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>lab7-web</title>
  </head>
  <style >
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
   .board {
      display: grid;
      grid-template-columns: repeat(15, 32px);
      grid-template-rows: repeat(15, 32px);
      border: 2px solid red;
      position: relative;
   }

    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: rgba(0, 0, 0, 0.75);
      z-index: 10;
    }

    .overlay-title { color: white; font-size: 24px; font-weight: bold; }
    .overlay-title.game-over { color: red; }
    .overlay-sub { color: #ccc; font-size: 13px; }
    .btn {
      padding: 8px 20px;
      background: green;
      color: white;
      border: none;
      cursor: pointer;
      font-size: 14px;
    }

  </style>
  <body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel">
      const root = document.getElementById('root')
      const reactRoot = ReactDOM.createRoot(root)
      const Segment = ({ x, y }) => {
        const style = {
          width: '30px',
          height: '30px',
          background: 'green',
          boxSizing: 'border-box',
          border: '1px solid darkgreen',
          gridColumn: x,
          gridRow: y,
        }

        return <div style={style} />
      }

      const Snake = ({ snake }) => {
        return (
          <>
            {snake.map((part, index) => (
              <Segment key={index} x={part.x} y={part.y} />
            ))}
          </>
        )
      }

      const Food = ({ food }) => {
        const style = {
          width: '30px',
          height: '30px',
          background: 'red',
          gridColumn: food.x,
          gridRow: food.y,
        }

        return <div style={style}></div>
      }

      const Overlay = ({ type, score, onStart }) => (
        <div className="overlay">
          {type === 'start' ? (
            <>
              <div className="overlay-title">SNAKE</div>
              <div className="overlay-sub">
                USA LAS FLECHAS PARA MOVER
              </div>
              <button className="btn" onClick={onStart}>INICIAR</button>
            </>
          ) : (
            <>
              <div className="overlay-title game-over">GAME OVER</div>
              <div className="overlay-sub">PUNTAJE FINAL: {score}</div>
              <button className="btn" onClick={onStart}>REINICIAR</button>
            </>
          )}
        </div>
      )

      const Board = ({ snake, food, gameState, score, onStart }) => {
        return (
          <main className="board">
            {(gameState === 'idle' || gameState === 'over') && (
              <Overlay
                type={gameState === 'idle' ? 'start' : 'over'}
                score={score}
                onStart={onStart}
              />
            )}
            <Snake snake={snake} />
            <Food food={food} />
          </main>
        )
      }

      const Score = ({ score }) => {
        return (
          <h2 style={{ marginBottom: '20px' }}>
            Puntaje: {score}
          </h2>
        )
      }   

      const Game = () => {
        const [direction, setDirection] = React.useState('ArrowRight')
        const [gameState, setGameState] = React.useState('idle')
        const [score, setScore] = React.useState(0)
        const [snake, setSnake] = React.useState([
          { x: 7, y: 8 },
          { x: 6, y: 8 },
          { x: 5, y: 8 },
        ])
        const [food, setFood] = React.useState({
          x: Math.floor(Math.random() * 15) + 1,
          y: Math.floor(Math.random() * 15) + 1,
        })
        const handleStart = () => {
          setSnake([{ x: 7, y: 8 }, { x: 6, y: 8 }, { x: 5, y: 8 }])
          setFood({ x: Math.floor(Math.random() * 15) + 1, y: Math.floor(Math.random() * 15) + 1 })
          setDirection('ArrowRight')
          setScore(0)
          setGameState('playing')
        }

        React.useEffect(() => {
          const handleKeyDown = (e) => {
            if (
              e.key === 'ArrowUp' ||
              e.key === 'ArrowDown' ||
              e.key === 'ArrowLeft' ||
              e.key === 'ArrowRight'
            ) {
              setDirection(e.key)
            }
          }

          window.addEventListener('keydown', handleKeyDown)
          return () => window.removeEventListener('keydown', handleKeyDown)
        }, [])

        React.useEffect(() => {
          if (gameState !== 'playing') return

          const interval = setInterval(() => {
            setSnake((prev) => {
              const head = prev[0]
              let newHead = { x: head.x, y: head.y }

              // movimiento
              switch (direction) {
                case 'ArrowRight':
                  newHead = { x: head.x + 1, y: head.y }
                  break
                case 'ArrowLeft':
                  newHead = { x: head.x - 1, y: head.y }
                  break
                case 'ArrowUp':
                  newHead = { x: head.x, y: head.y - 1 }
                  break
                case 'ArrowDown':
                  newHead = { x: head.x, y: head.y + 1 }
                  break
              }
              
              newHead.x = ((newHead.x - 1 + 15) % 15) + 1
              newHead.y = ((newHead.y - 1 + 15) % 15) + 1

              const hitSelf = prev.some(
                (part, index) =>
                  index !== 0 &&
                  part.x === newHead.x &&
                  part.y === newHead.y
              )

              if (hitSelf) {
                setGameState('over')
                return prev
              }

              const ateFood =
                newHead.x === food.x && newHead.y === food.y

              if (ateFood) {
                setFood({
                  x: Math.floor(Math.random() * 15) + 1,
                  y: Math.floor(Math.random() * 15) + 1,
                })

                setScore((s) => s + 1)

                return [newHead, ...prev] 
              }

              return [newHead, ...prev.slice(0, prev.length - 1)]
            })
          }, 300)

          return () => clearInterval(interval)
        }, [direction, gameState, food])

        return (
          <>
            <Score score={score} />
            <Board snake={snake} food={food} gameState={gameState} score={score} onStart={handleStart} />
          </>
        )
      }

      const App = () => {
        return <Game />
      }

      reactRoot.render(
          <App />
      )

    </script>
  </body>
</html>
